services:
  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - local.env
  db:
    image: postgres:15
    env_file:
      - local.env
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    env_file:
      - local.env
    ports:
      - "6379:6379"